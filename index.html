<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Maintenance Mode - TEDx Shibuya Youth</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght=300;400;600;800&display=swap" rel="stylesheet">
    <style>
        :root {
            --ted-red: #E62B1E;     /* Official TED Red */
            --dark-gray: #111111;   /* Primary text color */
            --light-gray: #767676;  /* Secondary text color */
            --bg-color: #FFFFFF;    /* Pure web white */
        }

        {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
        }

        body {
            font-family: 'Inter', -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
            background-color: var(--bg-color);
            color: var(--dark-gray);
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            padding: 20px;
            text-align: center;
        }

        .container {
            max-width: 650px;
            width: 100%;
            animation: fadeIn 0.8s ease-in-out;
        }

        .logo-container {
            margin-bottom: 60px;
            display: inline-block;
        }

        .logo-text {
            font-size: 2.8rem;
            font-weight: 800;
            letter-spacing: -1.5px;
            line-height: 1;
        }

        .ted {
            color: var(--ted-red);
        }

        .x {
            color: var(--ted-red);
            font-size: 0.7em;
            vertical-align: super;
            margin-left: -2px;
            font-weight: 600;
        }

        .location {
            color: var(--dark-gray);
            font-weight: 300;
            margin-left: 5px;
            letter-spacing: -0.5px;
        }


        /* Announcement */
        h1 {
            font-size: 1.85rem;
            font-weight: 800;
            color: var(--dark-gray);
            margin-bottom: 16px;
            line-height: 1.3;
            letter-spacing: -0.5px;
        }

        p {
            font-size: 0.95rem;
            color: var(--light-gray);
            line-height: 1.6;
            margin-bottom: 24px;
        }

        .contact-email {
            display: inline-block;
            font-weight: 600;
            color: var(--ted-red);
            text-decoration: none;
            font-size: 1rem;
            transition: color 0.2s ease;
            margin-bottom: 50px;
        }

        .contact-email:hover {
            color: #b51c11;
            text-decoration: underline;
        }

        /* Social Icons */
        .follow-us {
            font-size: 0.85rem;
            font-weight: 600;
            text-transform: uppercase;
            letter-spacing: 1.5px;
            color: var(--dark-gray);
            margin-bottom: 15px;
        }

        .social-links {
            display: flex;
            justify-content: center;
            gap: 12px;
        }

        .social-icon {
            display: flex;
            justify-content: center;
            align-items: center;
            width: 40px;
            height: 40px;
            background-color: var(--ted-red);
            color: white;
            border-radius: 50%;
            transition: transform 0.2s ease, background-color 0.2s ease;
            text-decoration: none;
        }

        .social-icon:hover {
            transform: translateY(-3px);
            background-color: #111111;
        }

        .social-icon svg {
            width: 18px;
            height: 18px;
            fill: currentColor;
        }

        @keyframes fadeIn {
            from { opacity: 0; transform: translateY(10px); }
            to { opacity: 1; transform: translateY(0); }
        }

        @media (max-width: 480px) {
            .logo-text { font-size: 2.2rem; }
            h1 { font-size: 1.5rem; }
            p { font-size: 0.9rem; }
        }
    </style>
</head>
<body>

    <div class="container">
        <!--  Logo  -->
        <div class="logo-container">
            <div class="logo-text">
                <span class="ted">TED<span class="x">x</span></span><span class="location">Shibuya Youth</span>
            </div>
            <div class="tagline">x = independently organized TED event</div>
        </div>

        <!-- Maintenance Announcements -->
        <h1>We're sorry! The site is under maintenance right now.</h1>
        <p>Our website is currently down for scheduled maintenance. We'll return soon.<br>We appreciate your patience. Check us out on social media for more updates.</p>
        
        <!-- Contact email -->
        <a href="mailto:info@tokyouth.org" class="contact-email">info@tokyouth.org</a>

        <!-- Social Media -->
        <div class="follow-us">Follow Us!</div>
        <div class="social-links">

        </div>
    </div>

</body>
</html>
